<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY KISAH</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:
linear-gradient(180deg,#090909,#2a0000,#660000,#c9a227);
min-height:100vh;
padding:20px;
color:white;
}

.container{
max-width:700px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:42px;
color:gold;
font-family:"Times New Roman";
}

.card{
background:rgba(0,0,0,.45);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
box-shadow:0 0 20px rgba(255,0,0,.25);
margin-bottom:20px;
}

input, textarea{
width:100%;
padding:15px;
margin-top:12px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,.1);
color:white;
font-size:16px;
}

textarea{
height:180px;
resize:none;
}

input[type=file]{
background:none;
padding:5px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:15px;
font-size:16px;
font-weight:bold;
cursor:pointer;

background:
linear-gradient(90deg,gold,#ff0000);

color:black;
}

.story{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
margin-top:20px;
}

.story h2{
color:gold;
margin-bottom:8px;
}

.story img{
width:100%;
margin-top:15px;
border-radius:15px;
}

.deleteBtn{
background:#b00000;
color:white;
margin-top:15px;
}

.tanggal{
color:#ddd;
font-size:13px;
margin-bottom:10px;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>MY KISAH</h1>
<p>Buatlah kisah cerita mu di sini</p>
</div>

<div class="card">

<input type="text" id="nama" placeholder="Nama">

<input type="text" id="judul" placeholder="Judul Cerita">

<textarea id="isi"
placeholder="Tulis kisahmu di sini..."></textarea>

<input type="file" id="foto" accept="image/*">

<button onclick="simpanCerita()">
Simpan Kisah
</button>

</div>

<div id="daftarCerita"></div>

</div>

<script>

tampilkanCerita();

function simpanCerita(){

let nama=document.getElementById("nama").value;
let judul=document.getElementById("judul").value;
let isi=document.getElementById("isi").value;
let file=document.getElementById("foto").files[0];

if(judul=="" || isi==""){
alert("Isi judul dan cerita terlebih dahulu");
return;
}

if(file){

let reader=new FileReader();

reader.onload=function(){

simpanData(
nama,
judul,
isi,
reader.result
);

};

reader.readAsDataURL(file);

}else{

simpanData(
nama,
judul,
isi,
""
);

}

}

function simpanData(nama,judul,isi,foto){

let data=
JSON.parse(localStorage.getItem("kisah")) || [];

data.unshift({

nama:nama,
judul:judul,
isi:isi,
foto:foto,
tanggal:new Date().toLocaleDateString()

});

localStorage.setItem(
"kisah",
JSON.stringify(data)
);

document.getElementById("judul").value="";
document.getElementById("isi").value="";
document.getElementById("foto").value="";

tampilkanCerita();

}

function tampilkanCerita(){

let daftar=
document.getElementById("daftarCerita");

let data=
JSON.parse(localStorage.getItem("kisah")) || [];

daftar.innerHTML="";

for(let i=0;i<data.length;i++){

daftar.innerHTML += `

<div class="story">

<h2>${data[i].judul}</h2>

<div class="tanggal">
${data[i].nama} • ${data[i].tanggal}
</div>

<p>${data[i].isi}</p>

${data[i].foto ?
`<img src="${data[i].foto}">`
: ""}

<button class="deleteBtn"
onclick="hapusCerita(${i})">

Hapus Kisah

</button>

</div>

`;

}

}

function hapusCerita(index){

let data=
JSON.parse(localStorage.getItem("kisah")) || [];

data.splice(index,1);

localStorage.setItem(
"kisah",
JSON.stringify(data)
);

tampilkanCerita();

}

</script>

</body>
</html>
